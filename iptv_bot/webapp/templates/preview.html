<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview IPTV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body { background-color: #f4f6f9; }
    .item-url { font-size: 0.8rem; word-break: break-all; }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-3"><i class="bi bi-broadcast-pin me-2"></i>Preview IPTV</h2>
    <div class="row g-2 mb-3">
      <div class="col-md-8">
        <input id="urlInput" class="form-control form-control-sm font-monospace" value="{{url}}" />
      </div>
      <div class="col-auto">
        <button id="btnLoad" class="btn btn-primary btn-sm"><i class="bi bi-cloud-download me-1"></i>Carregar</button>
      </div>
      <div class="col-auto">
        <button id="btnRefresh" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-repeat me-1"></i>Forçar refresh</button>
      </div>
    </div>
    <div id="loadingIndicator" class="d-none text-muted small mb-2">
      <div class="spinner-border spinner-border-sm me-1"></div>Carregando...
    </div>
    <div id="infoMessage" class="mb-2"></div>
    <input id="searchInput" class="form-control form-control-sm mb-3" placeholder="Buscar canal..." />
    <div id="accordionContainer" class="accordion"></div>
    <pre id="rawPreview" class="mt-3 bg-dark text-white p-3 rounded small" style="max-height: 300px; overflow:auto; display:none;"></pre>
  </div>
  <script>
    let previewText = '';
    const urlInput = document.getElementById('urlInput');
    const loadBtn = document.getElementById('btnLoad');
    const refreshBtn = document.getElementById('btnRefresh');
    const loading = document.getElementById('loadingIndicator');
    const info = document.getElementById('infoMessage');
    const accordion = document.getElementById('accordionContainer');
    const raw = document.getElementById('rawPreview');
    const search = document.getElementById('searchInput');

    async function loadPreview(force = false) {
      const url = urlInput.value.trim();
      if (!url) return;
      loading.classList.remove('d-none');
      info.innerHTML = '';
      accordion.innerHTML = '';
      raw.style.display = 'none';
      try {
        const query = `?url=${encodeURIComponent(url)}&refresh=${force ? '1' : '0'}`;
        const resp = await fetch(`/api/m3u_preview${query}`);
        const text = await resp.text();
        previewText = text;
        raw.style.display = 'block';
        raw.textContent = text;
        if (resp.ok) {
          info.innerHTML = `<span class="text-success small"><i class="bi bi-check-circle"></i> ${text.length} caracteres</span>`;
          renderPreview(text, search.value);
        } else {
          info.innerHTML = `<span class="text-danger small">Falha: ${text.slice(0, 200)}</span>`;
        }
      } catch (e) {
        info.innerHTML = `<span class="text-danger small">Erro: ${e.message}</span>`;
      } finally {
        loading.classList.add('d-none');
      }
    }

    function renderPreview(text, filter = '') {
      const lines = text.split('\n');
      const groups = new Map();
      let currentGroup = 'Sem grupo';
      let currentItem = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (trimmed.startsWith('#EXTINF:')) {
          const groupMatch = trimmed.match(/group-title="([^"]*)"/);
          currentGroup = groupMatch ? (groupMatch[1] || 'Sem grupo') : 'Sem grupo';
          const nameMatch = trimmed.match(/,(.+)$/);
          const title = nameMatch ? nameMatch[1].trim() : trimmed;
          currentItem = { title, url: '' };
          if (!groups.has(currentGroup)) groups.set(currentGroup, []);
          groups.get(currentGroup).push(currentItem);
        } else if ((trimmed.startsWith('http://') || trimmed.startsWith('https://')) && currentItem) {
          currentItem.url = trimmed;
        }
      }
      accordion.innerHTML = '';
      if (!groups.size) {
        accordion.innerHTML = '<p class="text-muted small">Nenhum item M3U encontrado.</p>';
        return;
      }
      const filterTerm = filter.trim().toLowerCase();
      let index = 0;
      for (const [group, items] of groups) {
        const visibleItems = items.filter(item => {
          if (!filterTerm) return true;
          return item.title.toLowerCase().includes(filterTerm) || item.url.toLowerCase().includes(filterTerm);
        });
        if (!visibleItems.length) { index++; continue; }
        const groupId = `preview-group-${index}`;
        const itemHtml = visibleItems.map(item => `
          <div class="d-flex justify-content-between align-items-start py-2 border-bottom">
            <div>
              <div class="fw-semibold">${escapeHtml(item.title)}</div>
              <div class="item-url"><a href="${item.url}" target="_blank" rel="noopener">${escapeHtml(item.url)}</a></div>
            </div>
          </div>
        `).join('');
        const groupElem = document.createElement('div');
        groupElem.className = 'accordion-item';
        groupElem.innerHTML = `
          <h2 class="accordion-header" id="heading-${groupId}">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${groupId}">
              ${escapeHtml(group)} <span class="badge bg-secondary ms-2">${visibleItems.length}</span>
            </button>
          </h2>
          <div id="collapse-${groupId}" class="accordion-collapse collapse" data-bs-parent="#accordionContainer">
            <div class="accordion-body p-2">${itemHtml}</div>
          </div>
        `;
        accordion.appendChild(groupElem);
        index++;
      }
      if (!accordion.innerHTML.trim()) {
        accordion.innerHTML = '<p class="text-muted small">Nenhum canal encontrado.</p>';
      }
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    loadBtn.addEventListener('click', () => loadPreview(false));
    refreshBtn.addEventListener('click', () => loadPreview(true));
    search.addEventListener('input', () => renderPreview(previewText, search.value));

    if (urlInput.value) loadPreview(false);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
